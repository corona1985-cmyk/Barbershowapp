
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>BarberShow - Sistema Multi-Sede</title>
    <!-- Configuración para Android APK -->
    <meta name="theme-color" content="#1e293b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: contain; /* Evita el 'pull to refresh' de Android */
            -webkit-tap-highlight-color: transparent;
        }
        /* Ajuste para que los campos de texto no hagan zoom en Android */
        input, select, textarea {
            font-size: 16px !important;
        }
        #qr-print-area { position: absolute; left: -9999px; top: 0; width: 1px; height: 1px; overflow: hidden; }
        @media print {
            .no-print, nav, aside, header { display: none !important; }
            .print-header { display: block !important; }
            body { background: white !important; }
            main { margin-left: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; }
            .print-container { padding: 20px !important; }
            .page-break-inside-avoid { page-break-inside: avoid; }
            /* Imprimir factura: solo #invoice-print-area */
            body * { visibility: hidden; }
            #invoice-print-area, #invoice-print-area * { visibility: visible; }
            #invoice-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; max-width: none !important; padding: 16px !important; }
            /* Imprimir QR: cuando body tiene .print-qr, solo #qr-print-area */
            body.print-qr * { visibility: hidden; }
            body.print-qr #qr-print-area, body.print-qr #qr-print-area * { visibility: visible; }
            body.print-qr #qr-print-area { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; height: auto !important; padding: 24px !important; }
        }
    </style>
    <link rel="stylesheet" href="/index.css">
    <style>
        #app-splash {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease;
        }
        #app-splash.hide { opacity: 0; pointer-events: none; }
        #app-splash img { width: min(280px, 70vw); height: auto; border-radius: 24px; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800">
    <div id="app-splash" aria-hidden="true">
        <img src="./logo.png" alt="BarberShow" width="280" height="280">
    </div>
    <div id="root"></div>
    <div id="qr-print-area" aria-hidden="true"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
